name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out rules and engine pin
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install packages
        run: npm ci

      - name: Verify authored rules and Rust artifact boundary
        run: npm test

      - name: Run the portable gameplay smoke
        run: npm run play:smoke

      - name: Check the portable consumer
        run: cargo check --locked --manifest-path consumer/Cargo.toml
